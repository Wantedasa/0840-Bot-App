<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>0840-Bot App Download</title>

<!-- Version ganz oben definieren -->
<script>
    // 🔹 Hier Version ändern
    const appVersion = "Version 0.0.5";

    // Automatisch in das HTML einfügen, sobald Seite geladen wird
    function setVersion() {
        const versionElement = document.getElementById('version-text');
        if (versionElement) {
            versionElement.textContent = appVersion;
        }
    }
    window.onload = setVersion;
</script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    text-align: center;
}

.container {
    padding: 60px 20px;
}

.logo {
    font-size: 48px;
    font-weight: bold;
    color: #00FFD1;
    text-shadow: 0 0 10px #00FFD1;
    margin-bottom: 40px;
}

.card {
    background: #1e293b;
    border-radius: 20px;
    padding: 40px 30px;
    margin: 0 auto 40px;
    max-width: 450px;
    box-shadow: 0 10px 30px rgba(0,255,209,0.25);
    transition: transform 0.3s, box-shadow 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 40px rgba(0,255,209,0.3);
}

h2 {
    margin-top: 0;
    color: #00FFD1;
    font-size: 26px;
}

.version {
    color: #94a3b8;
    margin: 10px 0 20px;
    font-weight: bold;
}

.download-btn {
    display: inline-block;
    padding: 15px 35px;
    font-size: 18px;
    font-weight: bold;
    color: #000;
    background: #00FFD1;
    border-radius: 12px;
    text-decoration: none;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,255,209,0.3);
}

.download-btn:hover {
    background: #00c9a7;
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,255,209,0.4);
}

.info {
    margin-top: 15px;
    font-size: 14px;
    color: #94a3b8;
}

.info a {
    color: #00FFD1;
    text-decoration: none;
}

.info a:hover {
    text-decoration: underline;
}

.footer {
    margin-top: 50px;
    font-size: 12px;
    color: #64748b;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">🚀 0840-Bot App</div>

    <div class="card">
        <h2>Download</h2>
        <div class="version" id="version-text"></div>

        <a class="download-btn" 
           href="app-release.apk"
           download="0840-Bot.apk">
           ⬇️ APK direkt herunterladen
        </a>

        <div class="info">
            ⚠️ Unbekannte Apps installieren aktivieren
        </div>

        <div class="info">
            Falls der Download nicht startet:  
            <br>
            <a href="https://0840bot.de/app">
                Alternativer Download-Link
            </a>
        </div>
    </div>

    <div class="footer">
        © 2026 0840-Bot • Made by Samuel
    </div>

</div>

</body>
</html>
